services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pos_retail
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_retail"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pos_retail
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL_MODE: disable
      JWT_SECRET: change-me
      SECURE_HEADERS_ENABLED: "true"
      COMPRESSION_ENABLED: "true"
      RATE_LIMIT_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
